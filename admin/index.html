<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>YSP Collective — Admin</title>
</head>
<body>
 <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
 <script>
   // Auto-fill date_added with today's date on first save
   CMS.registerEventListener({
     name: 'preSave',
     handler: ({ entry }) => {
       if (!entry.data.date_added) {
         const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
         return { data: { ...entry.data, date_added: today } };
       }
     }
   });
 </script>
</body>
</html>
