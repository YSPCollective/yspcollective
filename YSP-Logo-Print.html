<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YSP Collective — Logo Print File</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">
  <style>
    @page {
      size: A4;
      margin: 0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 210mm;
      height: 297mm;
      background: #ffffff;
    }

    .page {
      width: 210mm;
      height: 297mm;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      text-align: center;
    }

    .logo-ysp {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 210pt;
      font-weight: 400;
      line-height: 1;
      color: #000000;
      letter-spacing: -0.01em;
    }

    .logo-collective {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22pt;
      font-weight: 300;
      letter-spacing: 0.55em;
      color: #000000;
      text-transform: uppercase;
      margin-top: 12pt;
      padding-left: 0.55em; /* compensate for trailing letter-spacing */
    }

    .logo-rule {
      width: 72pt;
      height: 0.75pt;
      background: #000000;
      margin: 10pt auto 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo">
      <div class="logo-ysp">YSP</div>
      <div class="logo-collective">Collective</div>
      <div class="logo-rule"></div>
    </div>
  </div>
</body>
</html>
